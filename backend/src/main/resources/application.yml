# All configuration is supplied via environment variables (${ENV_VAR:default}).
# No literal secrets live in this file. Local-only overrides belong in
# application-local.yml (gitignored), never here.
spring:
  application:
    name: weekly-commit
  datasource:
    url: ${WC_DB_URL:jdbc:postgresql://localhost:5432/weeklycommit}
    username: ${WC_DB_USERNAME:wc}
    password: ${WC_DB_PASSWORD:wc}
  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only validates against it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true

server:
  port: ${WC_SERVER_PORT:8080}

# Auth0 resource-server config. Supply via env in any real environment:
#   WC_AUTH_ISSUER_URI  -> wc.auth.issuer-uri  (e.g. https://your-tenant.auth0.com/)
#   WC_AUTH_AUDIENCE    -> wc.auth.audience    (the API identifier)
# Left undeclared here on purpose: when issuer-uri is absent the Auth0 JwtDecoder
# bean is not created (e.g. local/test), so the app starts without a live tenant.
wc:
  cors:
    allowed-origins: ${WC_CORS_ALLOWED_ORIGINS:http://localhost:5173}

---
# Local development profile: relaxed for running without external services.
# Auth relaxation + the startup guard that prevents this profile leaking to a
# deployed environment are wired in U4 (SecurityConfig / DevProfileGuard).
spring:
  config:
    activate:
      on-profile: dev
